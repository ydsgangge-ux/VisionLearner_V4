<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisionLearner API Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 20px;
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 {
      color: #e6a817;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle { color: #8b949e; margin-bottom: 30px; }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
    }
    
    .card-header {
      color: #e6a817;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .status {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .status.pending { background: #30363d; color: #8b949e; }
    .status.success { background: rgba(63,185,80,0.2); color: #3fb950; }
    .status.error { background: rgba(248,81,73,0.2); color: #f85149; }
    
    button {
      width: 100%;
      padding: 10px 16px;
      background: #1f6feb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #388bfd; }
    button:disabled { background: #30363d; cursor: not-allowed; }
    
    input, select, textarea {
      width: 100%;
      padding: 8px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 14px;
      margin-bottom: 10px;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #1f6feb;
    }
    
    .result {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
      margin-top: 15px;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
    }
    
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    .label {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
      color: #8b949e;
    }
    
    .info-bar {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      display: flex;
      gap: 20px;
      align-items: center;
    }
    
    .info-item {
      display: flex;
      flex-direction: column;
    }
    
    .info-label {
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
    }
    
    .info-value {
      font-size: 20px;
      font-weight: 600;
      color: #e6a817;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>VisionLearner API Test</h1>
    <p class="subtitle">简单测试各个API功能</p>
    
    <!-- Status Bar -->
    <div class="info-bar">
      <div class="info-item">
        <span class="info-label">服务器状态</span>
        <span class="info-value" id="server-status">检查中...</span>
      </div>
      <div class="info-item">
        <span class="info-label">当前目标</span>
        <span class="info-value" id="current-goal">未选择</span>
      </div>
      <div class="info-item">
        <span class="info-label">总体进度</span>
        <span class="info-value" id="overall-progress">0%</span>
      </div>
    </div>
    
    <div class="grid">
      <!-- Status Test -->
      <div class="card">
        <div class="card-header">
          <span>1. 系统状态</span>
          <span class="status pending" id="status-badge">待测试</span>
        </div>
        <button onclick="testStatus()" id="btn-status">测试 /api/status</button>
        <div class="result" id="status-result">
          <pre>点击按钮测试...</pre>
        </div>
      </div>
      
      <!-- Goals Test -->
      <div class="card">
        <div class="card-header">
          <span>2. 目标列表</span>
          <span class="status pending" id="goals-badge">待测试</span>
        </div>
        <button onclick="testGoals()" id="btn-goals">测试 /api/goals</button>
        <div class="result" id="goals-result">
          <pre>点击按钮测试...</pre>
        </div>
      </div>
      
      <!-- Select Goal Test -->
      <div class="card">
        <div class="card-header">
          <span>3. 选择/删除目标</span>
          <span class="status pending" id="select-badge">待测试</span>
        </div>
        <label class="label">选择目标:</label>
        <select id="goal-select">
          <option value="">先获取目标列表...</option>
        </select>
        <button onclick="testSelectGoal()" id="btn-select" disabled>切换到该目标</button>
        <button onclick="testDeleteGoal()" id="btn-delete" disabled style="background: #f85149; margin-top: 10px;">删除目标</button>
        <div class="result" id="select-result">
          <pre>选择目标后点击测试...</pre>
        </div>
      </div>

      <!-- Progress Test -->
      <div class="card">
        <div class="card-header">
          <span>4. 学习进度</span>
          <span class="status pending" id="progress-badge">待测试</span>
        </div>
        <button onclick="testProgress()" id="btn-progress">测试 /api/progress</button>
        <div class="result" id="progress-result">
          <pre>点击按钮测试...</pre>
        </div>
      </div>
      
      <!-- Mindmap Test -->
      <div class="card">
        <div class="card-header">
          <span>5. 思维导图</span>
          <span class="status pending" id="mindmap-badge">待测试</span>
        </div>
        <button onclick="testMindmap()" id="btn-mindmap">测试 /api/mindmap</button>
        <div class="result" id="mindmap-result">
          <pre>点击按钮测试...</pre>
        </div>
      </div>
      
      <!-- Ask Test -->
      <div class="card">
        <div class="card-header">
          <span>6. AI问答</span>
          <span class="status pending" id="ask-badge">待测试</span>
        </div>
        <label class="label">问题:</label>
        <input type="text" id="ask-input" placeholder="输入问题..." value="什么是Python？">

        <label class="label" style="margin-top: 10px;">回答模式:</label>
        <select id="ask-mode" style="width: 100%; padding: 8px; background: #21262d; border: 1px solid #30363d; border-radius: 4px; color: #c9d1d9; margin-bottom: 10px;">
          <option value="auto">自动模式（优先本地知识，必要时调用LLM）</option>
          <option value="local">本地知识模式（只从本地知识库检索）</option>
          <option value="llm">大模型学习模式（调用LLM并保存到知识库）</option>
        </select>

        <button onclick="testAsk()" id="btn-ask">测试 /api/ask</button>
        <div class="result" id="ask-result">
          <pre>输入问题后点击测试...</pre>
        </div>
      </div>
      
      <!-- New Goal Test -->
      <div class="card">
        <div class="card-header">
          <span>7. 创建目标</span>
          <span class="status pending" id="new-goal-badge">待测试</span>
        </div>
        <label class="label">目标描述:</label>
        <input type="text" id="new-goal-input" placeholder="例如：学习5个常用汉字" value="测试目标">
        <button onclick="testNewGoal()" id="btn-new-goal">测试 /api/goal/new</button>
        <div class="result" id="new-goal-result">
          <pre>输入目标描述后点击测试...</pre>
        </div>
      </div>
      
      <!-- Skills Test -->
      <div class="card">
        <div class="card-header">
          <span>8. 技能列表</span>
          <span class="status pending" id="skills-badge">待测试</span>
        </div>
        <button onclick="testSkills()" id="btn-skills">测试 /api/skills</button>
        <div class="result" id="skills-result">
          <pre>点击按钮测试...</pre>
        </div>
      </div>

      <!-- Image Recognition Test -->
      <div class="card">
        <div class="card-header">
          <span>9. 图片识别</span>
          <span class="status pending" id="image-badge">待测试</span>
        </div>
        <label class="label">上传图片:</label>
        <input type="file" id="image-input" accept="image/*" onchange="handleImageSelect(event)">
        <button onclick="testImageRecognition()" id="btn-image" disabled>测试图片识别</button>
        <div class="result" id="image-result">
          <pre>上传图片后点击测试...</pre>
        </div>
      </div>
    </div>
  </div>

    <script>
    const API_BASE = 'http://localhost:5000/api';

    // 下拉框改变时启用按钮
    document.addEventListener('DOMContentLoaded', () => {
      const select = document.getElementById('goal-select');
      if (select) {
        select.addEventListener('change', () => {
          const hasGoal = select.value !== '';
          document.getElementById('btn-select').disabled = !hasGoal;
          document.getElementById('btn-delete').disabled = !hasGoal;
        });
      }
    });
    
    // 显示结果
    function showResult(elementId, data, isError = false) {
      const el = document.getElementById(elementId);

      // 特殊处理图片识别结果
      if (elementId === 'image-result' && typeof data === 'object' && data.description) {
        let html = '';

        // 显示成功/失败状态
        if (data.success) {
          html += `<div style="color: #3fb950; margin-bottom: 10px;">✅ ${data.content}</div>`;
        } else if (data.error) {
          html += `<div style="color: #f85149; margin-bottom: 10px;">❌ ${data.error}</div>`;
        }

        // 显示完整描述
        if (data.description) {
          html += `
            <div style="margin-bottom: 15px;">
              <div style="color: #8b949e; font-size: 11px; margin-bottom: 5px;">图片识别描述:</div>
              <div style="background: #161b22; border: 1px solid #30363d; border-radius: 4px; padding: 10px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; font-size: 12px; line-height: 1.5;">
                ${data.description}
              </div>
            </div>
          `;
        }

        // 显示提取的知识点
        if (data.nodes && data.nodes.length > 0) {
          html += `
            <div style="color: #8b949e; font-size: 11px; margin-bottom: 5px;">提取的知识点 (${data.node_count}个):</div>
            <ul style="margin: 0; padding-left: 20px; font-size: 12px;">
              ${data.nodes.map(node => `
                <li style="margin: 5px 0;">
                  <strong style="color: #e6a817;">${node.title}</strong>
                  ${node.summary ? `<span style="color: #8b949e;"> - ${node.summary}</span>` : ''}
                </li>
              `).join('')}
            </ul>
          `;
        }

        el.innerHTML = html;
      } else {
        // 默认显示JSON
        const formatted = typeof data === 'object'
          ? JSON.stringify(data, null, 2)
          : String(data);
        el.innerHTML = `<pre>${formatted}</pre>`;
      }

      // 更新badge
      const badgeId = elementId.replace('-result', '-badge');
      const badge = document.getElementById(badgeId);
      if (badge) {
        badge.className = `status ${isError ? 'error' : 'success'}`;
        badge.textContent = isError ? '失败' : '成功';
      }
    }
    
    // 更新状态栏
    function updateStatusBar(status, goal, progress) {
      if (status !== undefined) {
        document.getElementById('server-status').textContent = status;
        document.getElementById('server-status').style.color = status === '在线' ? '#3fb950' : '#f85149';
      }
      if (goal !== undefined) {
        document.getElementById('current-goal').textContent = goal || '未选择';
      }
      if (progress !== undefined) {
        document.getElementById('overall-progress').textContent = Math.round(progress * 100) + '%';
      }
    }
    
    // API调用
    async function apiCall(endpoint, data = null) {
      try {
        const url = `${API_BASE}${endpoint}`;
        console.log(`[API Call] ${data ? 'POST' : 'GET'} ${url}`);

        const options = {
          method: data ? 'POST' : 'GET',
          headers: { 'Content-Type': 'application/json' }
        };
        if (data) options.body = JSON.stringify(data);

        const res = await fetch(url, options);

        console.log(`[API Response] Status: ${res.status}`);

        if (!res.ok) {
          const errorText = await res.text();
          console.error(`[API Error] ${errorText}`);
          throw new Error(`HTTP ${res.status}: ${errorText}`);
        }

        return await res.json();
      } catch (e) {
        console.error(`[API Exception] ${e.message}`);
        throw e;
      }
    }
    
    // 测试系统状态
    async function testStatus() {
      const btn = document.getElementById('btn-status');
      btn.disabled = true;
      btn.textContent = '测试中...';
      
      try {
        const data = await apiCall('/status');
        showResult('status-result', data);
        updateStatusBar('在线');
      } catch (e) {
        showResult('status-result', e.message, true);
        updateStatusBar('离线');
      }
      
      btn.disabled = false;
      btn.textContent = '测试 /api/status';
    }
    
    // 测试目标列表
    async function testGoals() {
      const btn = document.getElementById('btn-goals');
      btn.disabled = true;
      btn.textContent = '测试中...';
      
      try {
        const data = await apiCall('/goals');
        showResult('goals-result', data);
        
        // 更新下拉框
        const select = document.getElementById('goal-select');
        select.innerHTML = '<option value="">选择目标...</option>';
        data.forEach(g => {
          const option = document.createElement('option');
          option.value = g.id;
          option.textContent = g.description;
          select.appendChild(option);
        });

        // 启用选择和删除按钮
        document.getElementById('btn-select').disabled = false;
        document.getElementById('btn-delete').disabled = false;
      } catch (e) {
        showResult('goals-result', e.message, true);
      }
      
      btn.disabled = false;
      btn.textContent = '测试 /api/goals';
    }
    
    // 测试选择目标
    async function testSelectGoal() {
      const goalId = document.getElementById('goal-select').value;
      if (!goalId) {
        alert('请先选择一个目标');
        return;
      }
      
      const btn = document.getElementById('btn-select');
      btn.disabled = true;
      btn.textContent = '测试中...';
      
      try {
        const data = await apiCall('/goal/select', { goal_id: goalId });
        showResult('select-result', data);
        
        if (data.ok) {
          updateStatusBar(undefined, '已选择', undefined);
          // 刷新进度
          testProgress();
        }
      } catch (e) {
        showResult('select-result', e.message, true);
      }
      
      btn.disabled = false;
      btn.textContent = '切换到该目标';
    }

    // 测试删除目标
    async function testDeleteGoal() {
      const goalId = document.getElementById('goal-select').value;
      if (!goalId) {
        alert('请先选择一个目标');
        return;
      }

      if (!confirm('确定要删除这个目标吗？此操作不可恢复！')) {
        return;
      }

      const btn = document.getElementById('btn-delete');
      btn.disabled = true;
      btn.textContent = '删除中...';

      try {
        const data = await apiCall('/goal/delete', { goal_id: goalId });
        showResult('select-result', data);

        if (data.ok) {
          updateStatusBar(undefined, '未选择', undefined);
          // 刷新目标列表
          testGoals();
        }
      } catch (e) {
        showResult('select-result', e.message, true);
      }

      btn.disabled = false;
      btn.textContent = '删除目标';
    }

    // 测试进度
    async function testProgress() {
      const btn = document.getElementById('btn-progress');
      btn.disabled = true;
      btn.textContent = '测试中...';
      
      try {
        const data = await apiCall('/progress');
        showResult('progress-result', data);
        updateStatusBar(undefined, undefined, data.overall_completion || 0);
      } catch (e) {
        showResult('progress-result', e.message, true);
      }
      
      btn.disabled = false;
      btn.textContent = '测试 /api/progress';
    }
    
    // 测试思维导图
    async function testMindmap() {
      const btn = document.getElementById('btn-mindmap');
      btn.disabled = true;
      btn.textContent = '测试中...';
      
      try {
        const data = await apiCall('/mindmap');
        const summary = {
          id: data.id,
          title: data.title,
          node_count: countNodes(data)
        };
        showResult('mindmap-result', summary);
      } catch (e) {
        showResult('mindmap-result', e.message, true);
      }
      
      btn.disabled = false;
      btn.textContent = '测试 /api/mindmap';
    }
    
    function countNodes(node) {
      let count = 1;
      if (node.children) {
        node.children.forEach(c => count += countNodes(c));
      }
      return count;
    }
    
    // 测试问答
    async function testAsk() {
      const message = document.getElementById('ask-input').value.trim();
      const mode = document.getElementById('ask-mode').value;
      if (!message) {
        alert('请输入问题');
        return;
      }

      const btn = document.getElementById('btn-ask');
      btn.disabled = true;
      btn.textContent = '测试中...';

      try {
        const data = await apiCall('/ask', { message, mode });
        showResult('ask-result', { question: message, mode: mode, answer: data.answer });
      } catch (e) {
        showResult('ask-result', e.message, true);
      }

      btn.disabled = false;
      btn.textContent = '测试 /api/ask';
    }
    
    // 测试创建目标
    async function testNewGoal() {
      const desc = document.getElementById('new-goal-input').value.trim();
      if (!desc) {
        alert('请输入目标描述');
        return;
      }
      
      const btn = document.getElementById('btn-new-goal');
      btn.disabled = true;
      btn.textContent = '测试中...';
      
      try {
        const data = await apiCall('/goal/new', { description: desc, depth: 2 });
        showResult('new-goal-result', data);
        
        if (data.id) {
          // 刷新目标列表
          testGoals();
        }
      } catch (e) {
        showResult('new-goal-result', e.message, true);
      }
      
      btn.disabled = false;
      btn.textContent = '测试 /api/goal/new';
    }
    
    // 测试技能列表
    async function testSkills() {
      const btn = document.getElementById('btn-skills');
      btn.disabled = true;
      btn.textContent = '测试中...';

      try {
        const data = await apiCall('/skills');
        showResult('skills-result', data);
      } catch (e) {
        showResult('skills-result', e.message, true);
      }

      btn.disabled = false;
      btn.textContent = '测试 /api/skills';
    }

    // 图片选择处理
    let selectedImageBase64 = null;

    function handleImageSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        selectedImageBase64 = e.target.result.split(',')[1]; // 移除data:image/xxx;base64,前缀
        document.getElementById('btn-image').disabled = false;
        showResult('image-result', {
          filename: file.name,
          size: (file.size / 1024).toFixed(2) + ' KB',
          type: file.type,
          ready: true
        });
      };
      reader.readAsDataURL(file);
    }

    // 测试图片识别
    async function testImageRecognition() {
      if (!selectedImageBase64) {
        alert('请先选择图片');
        return;
      }

      const btn = document.getElementById('btn-image');
      btn.disabled = true;
      btn.textContent = '识别中...';

      try {
        // 将base64转换回Blob
        const byteCharacters = atob(selectedImageBase64);
        const byteNumbers = new Array(byteCharacters.length);
        for (let i = 0; i < byteCharacters.length; i++) {
          byteNumbers[i] = byteCharacters.charCodeAt(i);
        }
        const byteArray = new Uint8Array(byteNumbers);
        const blob = new Blob([byteArray], { type: 'image/jpeg' });

        const formData = new FormData();
        formData.append('file', blob, 'test.jpg');

        const res = await fetch(`${API_BASE}/multimodal/upload`, {
          method: 'POST',
          body: formData
        });

        if (!res.ok) {
          const errorText = await res.text();
          throw new Error(`HTTP ${res.status}: ${errorText}`);
        }

        const data = await res.json();
        showResult('image-result', data);
      } catch (e) {
        showResult('image-result', e.message, true);
      }

      btn.disabled = false;
      btn.textContent = '测试图片识别';
    }

    // 页面加载时自动测试状态
    window.onload = function() {
      console.log('Test UI loaded');
      setTimeout(() => testStatus(), 500);
    };
  </script>
</body>
</html>
